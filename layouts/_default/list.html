{{ define "main" }}
<article>
  <header class="article-header">
    <h1>{{ .Title }}</h1>
  </header>

  <ul class="post-list" aria-label="Posts">
    {{ range .Pages.ByDate.Reverse }}
    <li>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ else }}
    <li>No content yet.</li>
    {{ end }}
  </ul>
</article>
{{ end }}
